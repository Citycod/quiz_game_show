<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Quiz Game Show Host</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-panel">
    <div class="background-animation"></div>

    <div class="admin-container">
        <!-- Sidebar: Game Controls -->
        <aside class="sidebar">
            <div class="logo">HOST COMMAND</div>
            <div class="game-status-box">
                <span class="status-dot" id="statusDot"></span>
                <span id="gameStatusText">SYSTEM READY</span>
            </div>

            <nav class="nav-controls">
                <button class="nav-btn active" data-tab="dashboard">📊 DASHBOARD</button>
                <button class="nav-btn" data-tab="questions">❓ QUESTIONS</button>
                <button class="nav-btn" data-tab="logs">📑 RESPONSE LOGS</button>
            </nav>

            <div class="master-btns">
                <button class="action-btn stop" onclick="resetGame()">RESET SYSTEM</button>
                <button class="action-btn" id="pauseBtn" onclick="togglePause()">PAUSE GAME</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Dashboard Tab -->
            <section id="dashboard" class="tab-content active">
                <div class="stat-grid">
                    <div class="stat-card">
                        <label>ROUND</label>
                        <div class="val" id="currentRoundVal">--</div>
                    </div>
                    <div class="stat-card">
                        <label>QUESTION</label>
                        <div class="val" id="currentQuestionVal">--</div>
                    </div>
                </div>

                <div class="players-monitor">
                    <div class="player-card" id="p1Card">
                        <h3>PLAYER 1</h3>
                        <div class="score" id="p1Score">0</div>
                        <div class="p-status" id="p1Status">OFFLINE</div>
                    </div>
                    <div class="player-card" id="p2Card">
                        <h3>PLAYER 2</h3>
                        <div class="score" id="p2Score">0</div>
                        <div class="p-status" id="p2Status">OFFLINE</div>
                    </div>
                </div>

                <div class="round-controls">
                    <h2>ROUND CONTROL</h2>
                    <div class="btn-group">
                        <button class="round-btn" onclick="startRound(1)">START ROUND 1</button>
                        <button class="round-btn" onclick="startRound(2)">START ROUND 2</button>
                        <button class="round-btn" onclick="startRound(3)">START ROUND 3</button>
                    </div>
                    <button class="primary-btn pulse" id="nextBtn" onclick="nextQuestion()">NEXT QUESTION</button>
                </div>
            </section>

            <!-- Questions Tab -->
            <section id="questions" class="tab-content">
                <div class="question-loader">
                    <h2>DATABASE MANAGEMENT</h2>
                    <div class="upload-box">
                        <label>Load from CSV</label>
                        <div class="input-row">
                            <input type="text" id="csvPath" placeholder="e.g. questions-sample.csv" value="questions-sample.csv">
                            <button class="action-btn" onclick="loadCSV()">LOAD DATA</button>
                        </div>
                        <p id="questionCount">Questions in database: 0</p>
                    </div>
                </div>
            </section>

            <!-- Logs Tab -->
            <section id="logs" class="tab-content">
                <h2>REAL-TIME EVENT LOGS</h2>
                <div class="log-container" id="logConsole">
                    <!-- Logs will appear here -->
                </div>
                <button class="action-btn" onclick="getLogs()">REFRESH LOGS</button>
            </section>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin/admin.js"></script>
</body>
</html>
